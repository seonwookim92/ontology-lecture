name: Docker Release

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["GoReleaser Release"]
    types: [completed]
    branches: [main]

permissions: {}

env:
  DOCKER_REPOSITORY: neo4j/mcp

jobs:
  get-version:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.latest.outputs.output }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get the latest version
        id: latest
        uses: miniscruff/changie-action@6dcc2533cac0495148ed4046c438487e4dceaa23 # v2
        with:
          version: latest
          args: latest

  build-and-push-docker:
    needs: get-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to DockerHub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_KEY }}

      - name: Build and push ${{ matrix.arch }} image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: ${{ env.DOCKER_REPOSITORY }}:${{ matrix.arch }}-${{ needs.get-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  merge-manifests:
    needs: [get-version, build-and-push-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to DockerHub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_KEY }}

      - name: Create and push multi-arch manifest
        run: |
          VERSION=${{ needs.get-version.outputs.version }}
          docker buildx imagetools create \
            -t ${{ env.DOCKER_REPOSITORY }}:${VERSION} \
            -t ${{ env.DOCKER_REPOSITORY }}:latest \
            ${{ env.DOCKER_REPOSITORY }}:amd64-${VERSION} \
            ${{ env.DOCKER_REPOSITORY }}:arm64-${VERSION}
