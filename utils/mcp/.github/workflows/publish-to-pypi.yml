name: Publish to PyPI
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: build and smoke-test only, skip publish"
        type: boolean
        default: false
  release:
    types:
      - released
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: stable
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"
      - name: Get version
        id: get-version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/neo4j/mcp/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - run: pip install --require-hashes -r .github/workflows/requirements-build.txt
      - name: Prepare main package for go-to-wheel
        run: cp cmd/neo4j-mcp/main.go main.go
      - name: Build wheels with go-to-wheel
        run: |
          go-to-wheel . \
            --name neo4j-mcp-server \
            --version $VERSION \
            --description "Neo4j MCP server" \
            --license GPL-3.0-only \
            --url https://github.com/neo4j/mcp \
            --readme README.md \
            --platforms linux-amd64,linux-arm64,darwin-amd64,darwin-arm64,windows-amd64,windows-arm64 \
            --set-version-var main.Version
        env:
          VERSION: ${{ steps.get-version.outputs.version }}
      - name: Build reference linux-amd64 binary
        env:
          VERSION: ${{ steps.get-version.outputs.version }}
          CGO_ENABLED: "0"
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.Version=$VERSION" -o /tmp/neo4j-mcp-server-ref .
      - name: Extract wheel binary
        run: |
          WHL=$(ls dist/*linux*x86_64*.whl | head -n1)
          unzip -q "$WHL" -d /tmp/wheel_verify
          cp /tmp/wheel_verify/neo4j_mcp_server/bin/neo4j-mcp-server /tmp/neo4j-mcp-server-wheel
      - name: Verify checksum matches go-to-wheel binary
        run: |
          REF_HASH=$(sha256sum /tmp/neo4j-mcp-server-ref | awk '{print $1}')
          WHEEL_HASH=$(sha256sum /tmp/neo4j-mcp-server-wheel | awk '{print $1}')

          if [ "$REF_HASH" != "$WHEEL_HASH" ]; then
            echo "ERROR: Checksum mismatch!"
            echo "  Reference: $REF_HASH"
            echo "  Wheel:     $WHEEL_HASH"
            exit 1
          fi
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: wheels
          path: dist/
  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: wheels
          path: dist/
      - name: Smoke test linux-amd64 binary
        run: bash .github/scripts/smoke-test-wheel.sh "$VERSION"
        env:
          VERSION: ${{ needs.build.outputs.version }}
  publish:
    needs: smoke-test
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: wheels
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
