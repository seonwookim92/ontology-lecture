version: '3.8'

services:
  neo4j:
    image: neo4j:latest
    container_name: neo4j_ch4
    platform: linux/arm64
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - ACTIVE_DATASET=${ACTIVE_DATASET}
    volumes:
      - neo4j_data_ch4:/data
      - neo4j_logs_ch4:/logs
      - ../../neo4j/import:/var/lib/neo4j/import
      - ../../neo4j/plugins:/plugins
      - ../../dataset:/dataset:ro
      - ./neo4j_init.sh:/startup/neo4j_init.sh:ro
    entrypoint: /startup/neo4j_init.sh
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7474/"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  neo4j-mcp:
    build:
      context: ../../utils/mcp
      dockerfile: Dockerfile
    container_name: neo4j_mcp_ch4
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_TRANSPORT_MODE=http      # HTTP 모드: 인증은 요청별 Basic Auth로 처리 (USERNAME/PASSWORD 환경변수 사용 불가)
      - NEO4J_MCP_HTTP_PORT=8080
      - NEO4J_MCP_HTTP_HOST=0.0.0.0
      - NEO4J_LOG_LEVEL=info
      - NEO4J_SCHEMA_SAMPLE_SIZE=10   # 스키마 응답 크기 제한 (컨텍스트 오버플로우 방지)
    depends_on:
      - neo4j
    restart: unless-stopped

  mcpo:
    image: ghcr.io/open-webui/mcpo:main
    container_name: mcpo_ch4
    command: ["--host", "0.0.0.0", "--port", "8080", "--config", "/app/config.json"]
    volumes:
      - ./mcpo_config.json:/app/config.json:ro
    ports:
      - "8082:8080"   # n8n 외부에서 디버깅용: curl http://localhost:8082/neo4j/openapi.json
    depends_on:
      - neo4j-mcp
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n_ch4
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - N8N_ENCRYPTION_KEY=practice_key
    volumes:
      - n8n_data_ch4:/home/node/.n8n
      - ./data:/home/node/.n8n-files
    depends_on:
      - neo4j
      - mcpo
    restart: unless-stopped

volumes:
  neo4j_data_ch4:
  neo4j_logs_ch4:
  n8n_data_ch4:
