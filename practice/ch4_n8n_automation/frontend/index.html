<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Graph Explorer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-bottom: 1px solid #0f3460;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 1.5rem; color: #e94560; }
    header p  { font-size: 0.85rem; color: #888; }

    .graph-icon {
      width: 40px; height: 40px;
      background: #e94560;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1.6fr;
      gap: 0;
      height: calc(100vh - 81px);
    }

    /* Left Panel */
    .left-panel {
      background: #1a1a2e;
      border-right: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 16px;
      overflow-y: auto;
    }

    .search-box {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .search-box label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .search-box textarea {
      background: #0f0f1a;
      border: 1px solid #0f3460;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.95rem;
      padding: 12px;
      resize: vertical;
      min-height: 100px;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .search-box textarea:focus { outline: none; border-color: #e94560; }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-primary:hover { background: #c73652; transform: translateY(-1px); }
    .btn-primary:disabled { background: #555; cursor: not-allowed; transform: none; }

    .suggestions-section { margin-top: 8px; }
    .suggestions-section h3 { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .suggestions { display: flex; flex-direction: column; gap: 8px; }
    .suggestion-chip {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 0.85rem;
      color: #aaa;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    .suggestion-chip:hover { border-color: #e94560; color: #e0e0e0; }

    .quick-queries h3 { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .quick-btn {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 10px;
      font-size: 0.8rem;
      color: #ccc;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    .quick-btn:hover { border-color: #e94560; color: #fff; background: #1e2d4a; }

    /* Right Panel */
    .right-panel {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .result-header {
      padding: 16px 24px;
      background: #1a1a2e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .result-header h2 { font-size: 0.95rem; color: #ccc; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
    .status-dot.active { background: #4caf50; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .result-body { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }

    .placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #444;
    }
    .placeholder .icon { font-size: 3rem; }
    .placeholder p { font-size: 0.9rem; }

    .answer-card {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 20px;
    }
    .answer-card h3 { font-size: 0.75rem; color: #e94560; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .answer-text { font-size: 0.95rem; line-height: 1.6; color: #ddd; }

    .cypher-card {
      background: #0a0a14;
      border: 1px solid #1e3a5f;
      border-radius: 12px;
      padding: 16px;
    }
    .cypher-card h3 { font-size: 0.75rem; color: #4a9eff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .cypher-code { font-family: 'Courier New', monospace; font-size: 0.85rem; color: #7ec8e3; white-space: pre-wrap; word-break: break-all; }

    .results-card {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      overflow: hidden;
    }
    .results-card h3 { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; padding: 14px 20px; background: #16213e; border-bottom: 1px solid #0f3460; }
    .results-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .results-table th { background: #0f3460; color: #aaa; padding: 10px 16px; text-align: left; font-weight: 500; }
    .results-table td { padding: 10px 16px; border-bottom: 1px solid #1e2d4a; color: #ccc; }
    .results-table tr:hover td { background: #16213e; }
    .results-table tr:last-child td { border-bottom: none; }
    .no-results { padding: 20px; text-align: center; color: #555; font-size: 0.85rem; }

    .loading {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px;
      color: #888;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #333;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-card {
      background: #2a1a1a;
      border: 1px solid #5a2020;
      border-radius: 12px;
      padding: 16px;
      color: #e08080;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<header>
  <div class="graph-icon">🎬</div>
  <div>
    <h1>Movie Graph Explorer</h1>
    <p>Powered by Neo4j Knowledge Graph + LLM · n8n Backend</p>
  </div>
</header>

<main>
  <div class="left-panel">
    <div class="search-box">
      <label>질문 입력</label>
      <textarea id="queryInput" placeholder="예: 버스터 키튼이 출연한 코미디 영화 추천해줘&#10;예: 1920년대 영화 감독 목록 보여줘&#10;예: 가장 많이 출연한 배우는 누구야?"></textarea>
      <button class="btn btn-primary" id="searchBtn" onclick="search()">검색</button>
    </div>

    <div class="quick-queries">
      <h3>빠른 질문</h3>
      <div class="quick-grid">
        <button class="quick-btn" onclick="setQuery(this.textContent)">최고 평점 영화 TOP 5</button>
        <button class="quick-btn" onclick="setQuery(this.textContent)">가장 많이 출연한 배우</button>
        <button class="quick-btn" onclick="setQuery(this.textContent)">장르 종류 보여줘</button>
        <button class="quick-btn" onclick="setQuery(this.textContent)">감독이자 배우인 사람</button>
        <button class="quick-btn" onclick="setQuery(this.textContent)">버스터 키튼 출연작</button>
        <button class="quick-btn" onclick="setQuery(this.textContent)">Action 장르 영화 목록</button>
      </div>
    </div>

    <div class="suggestions-section" id="suggestionsSection" style="display:none;">
      <h3>추천 다음 질문</h3>
      <div class="suggestions" id="suggestionsList"></div>
    </div>
  </div>

  <div class="right-panel">
    <div class="result-header">
      <h2>결과</h2>
      <div class="status-dot" id="statusDot"></div>
    </div>

    <div class="result-body" id="resultBody">
      <div class="placeholder">
        <div class="icon">🔍</div>
        <p>질문을 입력하면 Neo4j 그래프에서 결과를 찾아드립니다.</p>
      </div>
    </div>
  </div>
</main>

<script>
  // ⚠️ n8n 워크플로우(07_webapp_backend)를 활성화한 후
  //    아래 URL을 실제 webhook URL로 교체하세요.
  const BACKEND_URL = 'http://localhost:5678/webhook/movie-assistant';

  function setQuery(text) {
    document.getElementById('queryInput').value = text;
    search();
  }

  async function search() {
    const message = document.getElementById('queryInput').value.trim();
    if (!message) return;

    const btn = document.getElementById('searchBtn');
    const dot = document.getElementById('statusDot');
    const body = document.getElementById('resultBody');

    btn.disabled = true;
    dot.className = 'status-dot active';
    body.innerHTML = `<div class="loading"><div class="spinner"></div><span>Neo4j 그래프를 탐색하는 중...</span></div>`;
    document.getElementById('suggestionsSection').style.display = 'none';

    try {
      const res = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      let data = await res.text();

      // AI가 JSON을 반환하면 파싱, 아니면 텍스트로 처리
      try {
        // JSON 블록 추출 시도
        const jsonMatch = data.match(/\{[\s\S]*\}/);
        if (jsonMatch) data = JSON.parse(jsonMatch[0]);
        else data = JSON.parse(data);
        renderStructured(data);
      } catch {
        renderText(data);
      }

    } catch (err) {
      body.innerHTML = `<div class="error-card">❌ 오류가 발생했습니다: ${err.message}<br><br>n8n 워크플로우가 활성화되어 있는지 확인하세요.</div>`;
    } finally {
      btn.disabled = false;
      dot.className = 'status-dot';
    }
  }

  function renderStructured(data) {
    const body = document.getElementById('resultBody');
    let html = '';

    if (data.answer) {
      html += `<div class="answer-card"><h3>📝 답변</h3><div class="answer-text">${data.answer}</div></div>`;
    }

    if (data.cypher) {
      html += `<div class="cypher-card"><h3>⚡ 실행된 Cypher 쿼리</h3><div class="cypher-code">${escapeHtml(data.cypher)}</div></div>`;
    }

    if (data.results && data.results.length > 0) {
      const rows = Array.isArray(data.results) ? data.results : [data.results];
      const keys = Object.keys(rows[0] || {});

      if (keys.length > 0) {
        const thead = keys.map(k => `<th>${k}</th>`).join('');
        const tbody = rows.map(row =>
          `<tr>${keys.map(k => `<td>${formatCell(row[k])}</td>`).join('')}</tr>`
        ).join('');

        html += `<div class="results-card">
          <h3>📊 데이터 (${rows.length}건)</h3>
          <table class="results-table"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>
        </div>`;
      }
    } else if (data.results !== undefined) {
      html += `<div class="results-card"><h3>📊 데이터</h3><div class="no-results">결과가 없습니다.</div></div>`;
    }

    body.innerHTML = html || `<div class="answer-card"><h3>📝 답변</h3><div class="answer-text">${escapeHtml(JSON.stringify(data, null, 2))}</div></div>`;

    if (data.suggestions && data.suggestions.length > 0) {
      const section = document.getElementById('suggestionsSection');
      const list = document.getElementById('suggestionsList');
      list.innerHTML = data.suggestions.map(s =>
        `<div class="suggestion-chip" onclick="setQuery('${s.replace(/'/g, "\\'")}')">${s}</div>`
      ).join('');
      section.style.display = 'block';
    }
  }

  function renderText(text) {
    document.getElementById('resultBody').innerHTML =
      `<div class="answer-card"><h3>📝 답변</h3><div class="answer-text">${escapeHtml(String(text))}</div></div>`;
  }

  function formatCell(val) {
    if (val === null || val === undefined) return '-';
    if (typeof val === 'object') return JSON.stringify(val);
    return escapeHtml(String(val));
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enter 키로 검색
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('queryInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.ctrlKey) search();
    });
  });
</script>
</body>
</html>
