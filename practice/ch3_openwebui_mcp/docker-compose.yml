version: '3.8'

services:
  neo4j:
    image: neo4j:latest
    container_name: neo4j_ch3
    platform: linux/arm64
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - ACTIVE_DATASET=${ACTIVE_DATASET}
    volumes:
      - neo4j_data_ch3:/data
      - neo4j_logs_ch3:/logs
      - ../../neo4j/import:/var/lib/neo4j/import
      - ../../neo4j/plugins:/plugins
      - ../../dataset:/dataset:ro
      - ./neo4j_init.sh:/startup/neo4j_init.sh:ro
    entrypoint: /startup/neo4j_init.sh
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open_webui_ch3
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=${VLLM_BASE_URL}
      - OPENAI_API_KEY=${LLM_API_KEY}
      - WEBUI_SECRET_KEY=practice_secret
    volumes:
      - open_webui_data_ch3:/app/backend/data
    depends_on:
      - neo4j
      - mcpo
    restart: unless-stopped

  mcpo:
    image: ghcr.io/open-webui/mcpo:main
    container_name: mcpo_ch3
    command: ["--host", "0.0.0.0", "--port", "8080", "--config", "/app/config.json"]
    volumes:
      - ./mcpo_config.json:/app/config.json:ro
    ports:
      - "8081:8080"
    depends_on:
      - neo4j-mcp
    restart: unless-stopped

  neo4j-mcp:
    build:
      context: ../../utils/mcp
      dockerfile: Dockerfile
    container_name: neo4j_mcp_ch3
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_TRANSPORT_MODE=http
      - NEO4J_MCP_HTTP_PORT=8080
      - NEO4J_MCP_HTTP_HOST=0.0.0.0
      - NEO4J_LOG_LEVEL=debug
      - NEO4J_SCHEMA_SAMPLE_SIZE=10
    depends_on:
      - neo4j
    restart: unless-stopped

volumes:
  neo4j_data_ch3:
  neo4j_logs_ch3:
  open_webui_data_ch3:
